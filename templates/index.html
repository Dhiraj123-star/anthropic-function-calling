<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anthropic AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<div class="shell">

  <header>
    <div class="header-left">
      <h1>Anthropic Assistant</h1>
      <span>Powered by Claude</span>
    </div>
    <button class="btn-reset" id="reset-btn">↺ New chat</button>
  </header>

  <div id="messages">
    <div class="empty-state" id="empty-state">
      <div class="big">Ask me anything.</div>
      <p>Weather · Web search · Conversation</p>
    </div>
  </div>

  <div class="input-bar">
    <textarea id="user-input" placeholder="Type a message…" rows="1"></textarea>
    <button id="send-btn" title="Send">&#9654;</button>
  </div>

</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');
  const resetBtn   = document.getElementById('reset-btn');
  const emptyState = document.getElementById('empty-state');

  // ── Auto-resize textarea ──────────────────────────────────────────
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  });

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  sendBtn.addEventListener('click', sendMessage);

  resetBtn.addEventListener('click', async () => {
    await fetch('/reset', { method: 'POST' });
    messagesEl.innerHTML = '';
    messagesEl.appendChild(emptyState);
    emptyState.style.display = '';
  });

  // ── Helpers ───────────────────────────────────────────────────────
  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addMessage(role, text) {
    emptyState.style.display = 'none';
    const wrap   = document.createElement('div');
    wrap.className = `msg ${role}`;
    const label  = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? 'You' : 'Claude';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = text;
    wrap.appendChild(label);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollBottom();
    return bubble;
  }

  // ── Markdown renderer ─────────────────────────────────────────────
  function renderMarkdown(raw) {
    let t = raw
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');

    // Fenced code blocks
    t = t.replace(/```[\w]*\n?([\s\S]*?)```/g, (_, c) =>
      `<pre><code>${c.trim()}</code></pre>`);

    // Inline code
    t = t.replace(/`([^`\n]+)`/g, '<code>$1</code>');

    // Bold / italic
    t = t.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    t = t.replace(/\*\*(.+?)\*\*/g,     '<strong>$1</strong>');
    t = t.replace(/\*(.+?)\*/g,         '<em>$1</em>');

    // Headers
    t = t.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    t = t.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
    t = t.replace(/^# (.+)$/gm,   '<h1>$1</h1>');

    // Horizontal rule
    t = t.replace(/^---+$/gm, '<hr>');

    // Blockquotes
    t = t.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

    // Unordered lists
    t = t.replace(/^[\*\-] (.+)$/gm, '<li>$1</li>');
    // Ordered lists
    t = t.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
    // Wrap consecutive <li> in <ul>
    t = t.replace(/(<li>[\s\S]*?<\/li>)(\n<li>[\s\S]*?<\/li>)*/g,
      m => `<ul>${m}</ul>`);

    // Paragraphs: split on blank lines, wrap non-block lines
    const blocks = t.split(/\n{2,}/);
    t = blocks.map(block => {
      block = block.trim();
      if (!block) return '';
      if (/^<(h[1-3]|ul|ol|pre|blockquote|hr)/.test(block)) return block;
      // Replace single newlines with <br> inside paragraph
      return `<p>${block.replace(/\n/g, '<br>')}</p>`;
    }).join('\n');

    return t;
  }

  // ── Main send function ────────────────────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    addMessage('user', text);
    emptyState.style.display = 'none';

    // Status chips container — inserted BEFORE the bot bubble so they
    // appear above the response even when they arrive mid-stream
    const statusContainer = document.createElement('div');
    statusContainer.className = 'status-container';
    messagesEl.appendChild(statusContainer);

    // Bot bubble
    const botWrap   = document.createElement('div');
    botWrap.className = 'msg bot';
    const botLabel  = document.createElement('div');
    botLabel.className = 'msg-label';
    botLabel.textContent = 'Claude';
    const botBubble = document.createElement('div');
    botBubble.className = 'msg-bubble markdown';
    const cursor    = document.createElement('span');
    cursor.className = 'cursor';
    botBubble.appendChild(cursor);
    botWrap.appendChild(botLabel);
    botWrap.appendChild(botBubble);
    messagesEl.appendChild(botWrap);
    scrollBottom();

    let botText = '';

    try {
      const response = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });

      const reader  = response.body.getReader();
      const decoder = new TextDecoder();
      let   buffer  = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const raw = line.slice(6).trim();
          if (!raw) continue;

          let evt;
          try { evt = JSON.parse(raw); } catch { continue; }

          if (evt.type === 'status') {
            // Always goes into statusContainer which sits ABOVE the bubble
            const chip = document.createElement('div');
            chip.className = 'status-chip';
            chip.textContent = evt.content;
            statusContainer.appendChild(chip);
            scrollBottom();

          } else if (evt.type === 'text') {
            botText += evt.content;
            botBubble.innerHTML = renderMarkdown(botText);
            botBubble.appendChild(cursor);
            scrollBottom();

          } else if (evt.type === 'done') {
            // Final render, no cursor
            botBubble.innerHTML = renderMarkdown(botText);
          }
        }
      }

    } catch (err) {
      botBubble.textContent = '⚠ Connection error. Please try again.';
      console.error(err);
    }

    cursor.remove();
    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>

</body>
</html>
