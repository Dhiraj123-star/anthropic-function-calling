services:
  anthropic-chatbot:
    build: .

    container_name: anthropic-chatbot

    ports:
      - "8000:8000"
    
    env_file:
      - .env

    restart: unless-stopped
  
  nginx:
    image: nginx:latest

    container_name: anthropic-nginx

    ports:
      - "80:80"
    
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    
    depends_on:
      - anthropic-chatbot
    
    restart: unless-stopped
    